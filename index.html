    function saveData(silent=false){
      normalizeData();

      localStorage.setItem(STORE_KEY, JSON.stringify(data));

      if(!firebaseLoaded){
        console.warn("Firebase not loaded yet - save skipped");
        return;
      }

      isSaving = true;

      teamDataRef().set(data)

          isSaving = false;
          if(!silent) toast("تم الحفظ");
        })
        .catch(() => {
          isSaving = false;
          toast("مشكلة في الحفظ", "error");
        });
    }

    function startRealtimeSync(){
      teamDataRef().on("value", snapshot => {
        if(isSaving) return;

          data = snapshot.val();
          normalizeData();
          firebaseLoaded = true;

          localStorage.setItem(STORE_KEY, JSON.stringify(data));

          buildNav();
          render();
        } else {

          normalizeData();

          else if(d.status === "progress") d.stage = "opportunity";

    function can(pageOrAction){
      const p = getCurrentPermissions();
      return p[pageOrAction] === true;
    }

window.login = function(){
  const email = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;

  if(!email || !password){
    toast("اكتب البريد وكلمة المرور", "error");
    return;
  }

  auth.signInWithEmailAndPassword(email, password)
    .catch(error => toast(error.message, "error"));
};

window.register = function(){
  const email = document.getElementById("username").value.trim();
  const password = document.getElementById("password").value;
  if(!email || !password) return toast("اكتب البريد وكلمة المرور", "error");
  auth.createUserWithEmailAndPassword(email, password).then(cred => {
    const isSuper = email === SUPER_ADMIN_EMAIL;
    const role = isSuper ? 'super_admin' : 'telesales';
    return db.ref("users/" + cred.user.uid).set({
      name: email.split('@')[0],
      email,
      role,
      permissions: getDefaultPermissions(role),
      createdAt: Date.now()
    });
  }).then(() => toast("تم إنشاء الحساب بنجاح")).catch(error => toast(arFirebaseError(error), "error"));
};

    function logoutUser(){
      auth.signOut()
        .then(() => toast('تم تسجيل الخروج'))
        .catch(() => toast('حدث خطأ أثناء تسجيل الخروج', 'error'));
    }

    function updateUserRole(uid, role){
      if(!isSuperAdmin()){
        toast("الصلاحيات للأدمن فقط", "error");
        return;
      }

      db.ref("users/" + uid).update({
        role: role
      });

      toast("تم تحديث الصلاحية");
    }

    auth.onAuthStateChanged(async (user) => {
      if (user) {
        currentFirebaseUser = user;
        document.getElementById("loginScreen").classList.add("hidden");
        document.getElementById("app").classList.remove("hidden");
        const snap = await db.ref("users/" + user.uid).once("value");
        let userData = snap.val() || {};
        if (user.email === SUPER_ADMIN_EMAIL && userData.role !== 'super_admin') {
          userData = { name: "Super Admin", email: user.email, role: 'super_admin', permissions: ROLE_PERMISSIONS.super_admin, createdAt: userData.createdAt || Date.now() };
          await db.ref("users/" + user.uid).set(userData);
        }
        currentUserData = userData;
        currentRole = userData.role || "user";
        if(isSuperAdmin()) migrateOldUsers();
        startRealtimeSync();
      } else {
        document.getElementById("loginScreen").classList.remove("hidden");
        document.getElementById("app").classList.add("hidden");
        currentUserData = null; currentFirebaseUser = null;
      }
    });

    function arFirebaseError(error){
      const code = error && error.code ? error.code : '';
      const messages = {
        'auth/invalid-email': 'البريد الإلكتروني غير صحيح',
        'auth/user-not-found': 'هذا الحساب غير موجود',
        'auth/wrong-password': 'كلمة المرور غير صحيحة',
        'auth/invalid-credential': 'بيانات الدخول غير صحيحة',
        'auth/email-already-in-use': 'هذا البريد مستخدم بالفعل',
        'auth/weak-password': 'كلمة المرور يجب أن تكون 6 أحرف على الأقل',
        'auth/network-request-failed': 'مشكلة في الاتصال بالإنترنت'
      };
      return messages[code] || error.message || 'خطأ غير معروف';
     }

      const q = query();

      return rows.filter(row => keys.some(k => String(row[k] || '').toLowerCase().includes(q)));

    function cell(type, key, value){
      if(key === 'photo') return value ? `<img class="mini-img" src="${value}">` : `<div class="mini-img"><i class="fa-solid fa-image text-slate-500"></i></div>`;

    function fileField(name, label, accept='image/*'){
      return `<label class="grid gap-1 md:col-span-2"><span class="text-sm text-slate-400 font-bold">${label}</span><input type="file" accept="${accept}" class="input" onchange="fileToHidden(event,'${name}')"><input type="hidden" name="${name}"></label>`;

    function fileToHidden(e, name){
      const file = e.target.files[0]; if(!file) return;
      if(file.size > 750000) return toast('الملف كبير. استخدم أقل من 750KB للنسخة المجانية', 'error');
      const reader = new FileReader();
      reader.onload = () => { const hidden = [...document.querySelectorAll(`input[name="${name}"]`)].find(i=>i.type==='hidden'); if(hidden) hidden.value = reader.result; toast('تم تحميل الملف داخل النموذج'); };
      reader.readAsDataURL(file);
    }

    function saveForm(e){
      e.preventDefault();

      ['amount','price','stock','target','sales','collected','commission'].forEach(k => {
        if(k in row) row[k] = Number(row[k] || 0);
      });
      Object.keys(row).forEach(k => { if(row[k] === '') delete row[k]; });

      if(editing.id){
        const idx = data[editing.type].findIndex(x => x.id === editing.id);
        data[editing.type][idx] = { ...data[editing.type][idx], ...row };
      } else {
        data[editing.type].push({ id: uid(), ...row });

      addNotification(`تم حفظ ${typeLabel(editing.type)} بنجاح`);
      saveData();
      closeModal();

    function importExcel(event){
      const file = event.target.files[0];
      if(!file) return;

      const reader = new FileReader();

      reader.onload = function(e){
        try {
          const workbook = XLSX.read(e.target.result, { type: "array" });

          let imported = {
            contacts: data.contacts || [],
            deals: data.deals || [],
            products: data.products || [],
            reps: data.reps || [],
            notifications: data.notifications || [],
            meta: data.meta || {}
          };

          workbook.SheetNames.forEach(sheetName => {
            const cleanName = sheetName.trim().toLowerCase();
            const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName], {
              defval: ""
            });

            const fixedRows = rows.map(row => ({
              id: row.id || uid(),
              ...row
            }));

            if(cleanName === "contacts" || cleanName === "customers" || cleanName === "lead" || cleanName === "clients" || cleanName === "العملاء"){
              imported.contacts = fixedRows;
            }

            if(cleanName === "deals" || cleanName === "sales" || cleanName === "الصفقات"){
              imported.deals = fixedRows;
            }

            if(cleanName === "products" || cleanName === "items" || cleanName === "المنتجات"){
              imported.products = fixedRows;
            }

            if(cleanName === "reps" || cleanName === "sales reps" || cleanName === "المندوبين"){
              imported.reps = fixedRows;
            }
          });

          data = imported;

          normalizeData();
          saveData();

          currentPage = "contacts";
          buildNav();
          render();

          toast("تم استيراد Excel وظهرت البيانات");

        } catch(err) {
          console.error(err);
          toast("ملف Excel غير صحيح", "error");
        }

        event.target.value = "";
      };

      reader.readAsArrayBuffer(file);
    }

function getReturnTotalByClient(client){
  return (data.returns || [])

}

function getReturnTotalByRep(rep){
  return (data.returns || [])
    .filter(r => r.rep === rep)
    .reduce((sum, r) => sum + Number(r.amount || 0), 0);
}

function getNetSalesByRep(rep){
  const sales = (data.deals || [])
    .filter(d => d.rep === rep && d.status === "done")
    .reduce((sum, d) => sum + Number(d.amount || 0), 0);

  const returns = getReturnTotalByRep(rep);

  return sales - returns;
}

function getNetSalesByClient(client){
  const sales = (data.deals || [])
    .filter(d => d.client === client && d.status === "done")
    .reduce((sum, d) => sum + Number(d.amount || 0), 0);

  const returns = getReturnTotalByClient(client);

  return sales - returns;
}

      <div class="card p-4">
        <div class="text-sm text-slate-400">صافي المبيعات</div>
        <div class="text-2xl font-black text-green-400">${money(netSales)} ج.م</div>
      </div>

      <div class="card p-4">
        <div class="text-sm text-slate-400">Conversion Rate</div>
        <div class="text-2xl font-black text-yellow-400">${conversionRate}%</div>
      </div>

    </div>

    <div class="card p-4">
      <h2 class="font-black mb-3">KPI المندوبين</h2>

      <div class="overflow-auto">
        <table class="table">
          <thead>
            <tr>
              <th>المندوب</th>
              <th>الهدف</th>
              <th>المبيعات</th>
              <th>المرتجعات</th>
              <th>الصافي</th>
              <th>نسبة التحقيق</th>
            </tr>
          </thead>
          <tbody>
            ${(data.reps || []).map(rep => {
              const gross = (data.deals || [])
                .filter(d => d.rep === rep.name && d.status === "done")
                .reduce((sum, d) => sum + Number(d.amount || 0), 0);

              const returns = getReturnTotalByRep(rep.name);
              const net = gross - returns;
              const percent = rep.target ? Math.round((net / rep.target) * 100) : 0;

              return `
                <tr>
                  <td>${escapeHTML(rep.name)}</td>
                  <td>${money(rep.target)}</td>
                  <td>${money(gross)}</td>
                  <td class="text-red-400">${money(returns)}</td>
                  <td class="text-green-400">${money(net)}</td>
                  <td>${percent}%</td>
                </tr>
              `;
            }).join("")}
          </tbody>
        </table>
      </div>
    </div>
  `;
}

function pipelineHTML(){
  return `
    <div class="grid grid-cols-5 gap-3">
      ${pipelineStages.map(stage => {
        const deals = (data.deals || []).filter(d => d.stage === stage);
        return `
          <div class="bg-[#111d35] rounded-lg p-3 border border-slate-700 min-h-[500px]">
            <h3 class="font-black text-sm mb-3 text-slate-300">${stageLabels[stage]}</h3>
            <div class="space-y-2" ondrop="dropDeal(event, '${stage}')" ondragover="dragOver(event)">
              ${deals.map(deal => `
                <div draggable="true" data-id="${deal.id}" ondragstart="dragDeal(event)" class="bg-[#0c1527] border border-[#2d9cdb] rounded p-2 cursor-move hover:shadow-lg transition">
                  <div class="font-bold text-xs text-[#2d9cdb]">${escapeHTML(deal.title)}</div>
                  <div class="text-xs text-slate-400 mt-1">${escapeHTML(deal.client)}</div>
                  <div class="font-black text-xs mt-2 text-green-400">${money(deal.amount)}</div>
                </div>
              `).join('')}
            </div>
          </div>
        `;
      }).join('')}
    </div>
  `;
}

function dragDeal(e){
  e.dataTransfer.effectAllowed = 'move';
  e.dataTransfer.setData('dealId', e.target.closest('[draggable]').dataset.id || '');
}

function dragOver(e){
  e.preventDefault();
  e.dataTransfer.dropEffect = 'move';
}

function dropDeal(e, stage){
  e.preventDefault();
  const dealId = e.dataTransfer.getData('dealId');
  const deal = data.deals.find(d => d.id === dealId);
  if(deal){
    deal.stage = stage;
    saveData();
    render();
    toast(`تم نقل الصفقة إلى ${stageLabels[stage]}`);
  }
}

function addTimeline(clientId, type, text){
  const client = data.contacts.find(c => c.id === clientId);
  if(!client) return;
  if(!client.timeline) client.timeline = [];
  client.timeline.unshift({
    id: uid(),
    type,
    text,
    date: Date.now()
  });
  saveData();
}

function teleSalesHTML(){
  const today = new Date().toDateString();
  const todayFollowups = (data.followups || []).filter(f => new Date(f.date).toDateString() === today).length;
  const todayInteractions = (data.interactions || []).filter(i => i.date && new Date(i.date).toDateString() === today).length;
  
  const closedToday = (data.deals || []).filter(d => d.status === 'done' && d.date && new Date(d.date).toDateString() === today).length;
  const conversionToday = todayFollowups > 0 ? Math.round((closedToday / todayFollowups) * 100) : 0;

  const topAgent = [...(data.reps || [])].sort((a,b) => Number(b.sales||0) - Number(a.sales||0))[0];
  const pendingFollowups = (data.followups || []).filter(f => f.status === 'pending').length;

  return `
    <div class="grid md:grid-cols-3 gap-3 mb-4">
      <div class="card p-4">
        <div class="text-sm text-slate-400">المتابعات اليوم</div>
        <div class="text-2xl font-black text-[#2d9cdb]">${todayFollowups}</div>
      </div>
      <div class="card p-4">
        <div class="text-sm text-slate-400">معدل التحويل</div>
        <div class="text-2xl font-black text-yellow-400">${conversionToday}%</div>
      </div>
      <div class="card p-4">
        <div class="text-sm text-slate-400">المتابعات المعلقة</div>
        <div class="text-2xl font-black text-red-400">${pendingFollowups}</div>
      </div>
    </div>

    <div class="grid md:grid-cols-2 gap-3">
      <div class="card p-4">
        <h3 class="font-black mb-3">أفضل موظف</h3>
        <div class="text-lg font-bold text-[#2d9cdb]">${escapeHTML(topAgent?.name || 'N/A')}</div>
        <div class="text-sm text-slate-400">المبيعات: ${money(topAgent?.sales || 0)}</div>
      </div>

      <div class="card p-4">
        <h3 class="font-black mb-3">المتابعات المعلقة</h3>
        ${(data.followups || []).filter(f => f.status === 'pending').slice(0, 5).map(f => `
          <div class="text-sm py-1">• ${escapeHTML(f.client)} - ${new Date(f.date).toLocaleDateString('ar-EG')}</div>
        `).join('')}
      </div>
    </div>
  `;
}

function clientDebt(clientName){
  const sales = (data.deals || [])
    .filter(d => d.client === clientName && d.status === 'done')
    .reduce((sum, d) => sum + Number(d.amount || 0), 0);
  
  const collections = (data.collections || [])
    .filter(c => c.client === clientName)
    .reduce((sum, c) => sum + Number(c.amount || 0), 0);
  
  return sales - collections;
}

function generateQuotePDF(deal){
  if(!window.jspdf) return toast('مكتبة PDF غير محملة', 'error');
  const { jsPDF } = window.jspdf;
  const pdf = new jsPDF();
  pdf.text('CRM-PROO - عرض سعر', 20, 20);
  pdf.text(`العميل: ${deal.client}`, 20, 40);
  pdf.text(`الموضوع: ${deal.title}`, 20, 50);
  pdf.text(`المبلغ: ${money(deal.amount)} ج.م`, 20, 60);
  pdf.text(`التاريخ: ${new Date(deal.date).toLocaleDateString('ar-EG')}`, 20, 70);
  pdf.save(`quote-${deal.client}.pdf`);
  toast('تم تحميل عرض السعر');
}

function generateDailyReport(){
  const report = `
📊 تقرير يومي - ${new Date().toLocaleDateString('ar-EG')}

👥 إجمالي العملاء: ${data.contacts.length}
💼 إجمالي الصفقات: ${data.deals.length}
✅ الصفقات المكتملة: ${data.deals.filter(d => d.status === 'done').length}
💰 إجمالي المبيعات: ${money((data.deals || []).filter(d => d.status === 'done').reduce((s,d) => s + Number(d.amount || 0), 0))} ج.م
📦 المرتجعات: ${money((data.returns || []).reduce((s,r) => s + Number(r.amount || 0), 0))} ج.م
`;
  console.log(report);
  addNotification(`تم إنشاء تقرير يومي: ${data.contacts.length} عميل`);
}

setInterval(generateDailyReport, 86400000);

</script>
